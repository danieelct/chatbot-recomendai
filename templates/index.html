<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recomendai</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0f1a0f;
            color: #9abad2;
            min-height: 100vh;
            background-image: url('https://imgs.search.brave.com/ZaaRtkmgm-Rv_t_GXzUgD_DaAWqbJBw9rfEegagD9RM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzLzJiLzhj/LzQ3LzJiOGM0N2Ey/ZDVlYmMxZWNhOThk/NDUwMmUxODE2MmNi/LmpwZw');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 20, 20, 0.65);
            z-index: 0;
            pointer-events: none;
        }
        #chatbox, #chatbox * { position: relative; z-index: 1; }
        #chatbox { max-width: 700px; margin: 60px auto; background: #9abad2; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.25); padding: 32px 24px; }
        #messages { height: 260px; overflow-y: auto; border: 1px solid #343a40; padding: 12px; margin-bottom: 18px; background: #181a1b; border-radius: 8px; }
        .user { color: #66b3ff; font-weight: 500; }
        .bot { color: #7fffd4; font-weight: 500; }
        .message { margin-bottom: 8px; }
        .form-control, .form-control:focus { background: #23272b; color: #f1f3f4; border: 1px solid #343a40; }
        .btn-primary { background: #0074d9; border: none; }
        .btn-primary:hover { background: #005fa3; }
        h2 { color: #f1f3f4; }
    </style>
</head>
<body>
    <div id="chatbox">
        <h2 class="text-center mb-4">🎧 Recomendai</h2>
        <div id="messages"></div>
        <div class="input-group">
            <input type="text" id="input" class="form-control" placeholder="Digite sua mensagem..." autofocus />
            <button id="send" class="btn btn-primary">Enviar</button>
        </div>
    </div>
    
    <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = 'message ' + sender;
        div.textContent = (sender === 'user' ? 'Você: ' : 'Recomendai: ') + text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    const mensagensIniciais = [
        "🎉 Hora da diversão! Prepare-se para uma recomendação que vai animar seu dia 😎🎧🎬",
        "🚀 Segura essa! Tenho algo incrível pra você… música, filme, série ou anime! 🍿✨",
        "🎬🎵🎮 Ei! Que tal algo que vai deixar seu dia mais divertido? Vamos descobrir juntos 😎"
    ];

    function enviarMensagemInicial() {
        const mensagemInicial = mensagensIniciais[Math.floor(Math.random() * mensagensIniciais.length)];
        addMessage(mensagemInicial, "bot");
    }

    enviarMensagemInicial();

    send.onclick = async function() {
        const text = input.value.trim();
        if (!text) return;

        send.disabled = true;
        addMessage(text, 'user');
        input.value = '';

        // Criar o indicador de "digitando"
        const typing = document.createElement('div');
        typing.className = 'message bot';
        typing.textContent = "Recomendai está pensando...";
        messages.appendChild(typing);
        messages.scrollTop = messages.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Enviando como "mensagem" para bater com seu app.py
                body: JSON.stringify({ mensagem: text }) 
            });

            const data = await response.json();
            
            // Remove o "digitando" antes de mostrar a resposta
            if (typing.parentNode) {
                messages.removeChild(typing);
            }

            // Mostra a resposta que veio do Python
            if (data.resposta) {
                addMessage(data.resposta, 'bot');
            } else {
                addMessage("Recebi uma resposta vazia, tente de novo! 😅", "bot");
            }

        } catch (error) {
            if (typing.parentNode) messages.removeChild(typing);
            addMessage("Houve um erro de conexão. Verifique se o servidor está rodando! ❌", "bot");
            console.error("Erro no Fetch:", error);
        }

        send.disabled = false;
    };

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            send.click();
        }
    });
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
